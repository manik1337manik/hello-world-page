<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Kid Friendly!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #FFB6C1 0%, #87CEEB 50%, #98FB98 100%);
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: linear-gradient(135deg, #FFFACD 0%, #FFE4B5 100%);
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.2);
            border: 5px solid #FF69B4;
            max-width: 500px;
        }

        h1 {
            color: #FF1493;
            font-size: 54px;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
            text-shadow: 3px 3px 0 #FFD700;
        }

        .emoji-large {
            font-size: 80px;
            margin: 20px 0;
            animation: spin 3s infinite linear;
            display: inline-block;
        }

        .emoji-small {
            font-size: 40px;
            margin: 0 10px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        p {
            color: #FF6347;
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #FFD700;
        }

        .subtitle {
            color: #4169E1;
            font-size: 18px;
            margin-bottom: 30px;
            font-style: italic;
        }

        button {
            background: linear-gradient(135deg, #FF69B4 0%, #FFB6C1 100%);
            color: white;
            border: 4px solid #FF1493;
            padding: 15px 35px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.2s ease;
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
            margin-top: 20px;
        }

        button:hover {
            transform: scale(1.1) rotate(-2deg);
            box-shadow: 0 8px 20px rgba(255, 20, 147, 0.6);
        }

        button:active {
            transform: scale(0.95);
        }

        .emoji-row {
            font-size: 50px;
            margin: 20px 0;
            letter-spacing: 15px;
            animation: wiggle 1s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        @keyframes wiggle {
            0%, 100% {
                transform: rotate(0deg);
            }
            25% {
                transform: rotate(-5deg);
            }
            75% {
                transform: rotate(5deg);
            }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #FFD700;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello World! 
            <span class="emoji-small">👋</span>
        </h1>
        
        <div class="emoji-large">🌍</div>
        
        <p>Welcome, awesome friend! 
            <span class="emoji-small">😊</span>
        </p>
        
        <div class="emoji-row">🎉 🎨 🎮 🎪</div>
        
        <p class="subtitle">Let's have some fun! 🎈</p>
        
        <button onclick="celebrate()">
            🎊 Click Me! 🎊
        </button>
    </div>

    <script>
        function celebrate() {
            alert('🎉 Yay! You clicked it! 🎉\n\n🦄 You are AWESOME! 🦄');
            
            // Create confetti effect
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * window.innerWidth + 'px';
                confetti.style.top = '-10px';
                confetti.textContent = ['🎉', '⭐', '🎈', '🎊', '✨'][Math.floor(Math.random() * 5)];
                confetti.style.fontSize = '30px';
                confetti.style.animation = `fall ${2 + Math.random() * 1}s linear`;
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes fall {
                to {
                    transform: translateY(100vh) rotate(360deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
